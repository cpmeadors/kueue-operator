---
apiVersion: tekton.dev/v1beta1
kind: Pipeline
metadata:
  name: provision-cluster
spec:
  description: |
    An integration test which provisions an ephemeral Hypershift cluster and obtains a kubeconfig.
  params:
    - description: Snapshot of the application
      name: SNAPSHOT
      default: '{"components": [{"name":"test-app", "containerImage": "quay.io/example/repo:latest"}]}'
      type: string
  tasks:
    - name: provision-eaas-space
      taskRef:
        resolver: git
        params:
          - name: url
            value: https://github.com/konflux-ci/build-definitions.git
          - name: revision
            value: main
          - name: pathInRepo
            value: task/eaas-provision-space/0.1/eaas-provision-space.yaml
      params:
        - name: ownerName
          value: $(context.pipelineRun.name)
        - name: ownerUid
          value: $(context.pipelineRun.uid)
    - name: provision-cluster
      runAfter:
        - provision-eaas-space
      taskSpec:
        results:
          - name: clusterName
            value: "$(steps.create-cluster.results.clusterName)"
        volumes:
          - name: credentials
            emptyDir: {}
        steps:
          - name: get-supported-versions
            ref:
              resolver: git
              params:
                - name: url
                  value: https://github.com/konflux-ci/build-definitions.git
                - name: revision
                  value: main
                - name: pathInRepo
                  value: stepactions/eaas-get-supported-ephemeral-cluster-versions/0.1/eaas-get-supported-ephemeral-cluster-versions.yaml
            params:
              - name: eaasSpaceSecretRef
                value: $(tasks.provision-eaas-space.results.secretRef)
          - name: pick-version
            ref:
              resolver: git
              params:
                - name: url
                  value: https://github.com/konflux-ci/build-definitions.git
                - name: revision
                  value: main
                - name: pathInRepo
                  value: stepactions/eaas-get-latest-openshift-version-by-prefix/0.1/eaas-get-latest-openshift-version-by-prefix.yaml
            params:
              - name: prefix
                value: "$(steps.get-supported-versions.results.versions[0])."
          - name: create-cluster
            ref:
              resolver: git
              params:
                - name: url
                  value: https://github.com/konflux-ci/build-definitions.git
                - name: revision
                  value: main
                - name: pathInRepo
                  value: stepactions/eaas-create-ephemeral-cluster-hypershift-aws/0.1/eaas-create-ephemeral-cluster-hypershift-aws.yaml
            params:
              - name: eaasSpaceSecretRef
                value: $(tasks.provision-eaas-space.results.secretRef)
              - name: version
                value: "$(steps.pick-version.results.version)"
              - name: instanceType
                value: m5.xlarge
              - name: imageContentSources
                value: |
                    - mirrors:
                        - quay.io/redhat-user-workloads/kueue-operator-tenant/kueue-operator-main
                      source: registry.redhat.io/kueue/kueue-rhel9-operator
                    - mirrors:
                        - quay.io/redhat-user-workloads/kueue-operator-tenant/kueue-operand-main
                      source: registry.redhat.io/kueue/kueue-rhel9
                    - mirrors:
                        - quay.io/redhat-user-workloads/kueue-operator-tenant/kueue-must-gather-main
                      source: registry.redhat.io/kueue/kueue-must-gather-rhel9
          - name: get-kubeconfig
            ref:
              resolver: git
              params:
                - name: url
                  value: https://github.com/konflux-ci/build-definitions.git
                - name: revision
                  value: main
                - name: pathInRepo
                  value: stepactions/eaas-get-ephemeral-cluster-credentials/0.1/eaas-get-ephemeral-cluster-credentials.yaml
            params:
              - name: eaasSpaceSecretRef
                value: $(tasks.provision-eaas-space.results.secretRef)
              - name: clusterName
                value: "$(steps.create-cluster.results.clusterName)"
              - name: credentials
                value: credentials
    - name: integration-tests
      runAfter:
        - provision-cluster
      description: runs the tests
      params:
        - name: SNAPSHOT
          value: $(params.SNAPSHOT)
      taskSpec:
        params:
        - name: SNAPSHOT
          type: string
        volumes:
          - name: credentials
            emptyDir: {}
        results:
        - name: TEST_OUTPUT
          description: Test output
        steps:
        - name: get-kubeconfig
          ref:
            resolver: git
            params:
              - name: url
                value: https://github.com/konflux-ci/build-definitions.git
              - name: revision
                value: main
              - name: pathInRepo
                value: stepactions/eaas-get-ephemeral-cluster-credentials/0.1/eaas-get-ephemeral-cluster-credentials.yaml
          params:
            - name: eaasSpaceSecretRef
              value: $(tasks.provision-eaas-space.results.secretRef)
            - name: clusterName
              value: "$(tasks.provision-cluster.results.clusterName)"
            - name: credentials
              value: credentials
        - image: registry.redhat.io/openshift4/ose-cli-rhel9:v4.20
          resources:
            requests:
              memory: 4Gi
            limits:
              memory: 4Gi
          env:
          - name: SNAPSHOT
            value: $(params.SNAPSHOT)
          - name: KUBECONFIG
            value: "/credentials/$(steps.get-kubeconfig.results.kubeconfig)"
          volumeMounts:
            - name: credentials
              mountPath: /credentials
          script: |
            dnf -y install jq git golang make podman
            echo ${SNAPSHOT} | jq .
            env

            OPERATOR_IMAGE=$(echo ${SNAPSHOT} | jq -r '.components[] | select(.name=="kueue-operator-main") | .containerImage')
            if [ "$OPERATOR_IMAGE" == "" ]; then
              OPERATOR_IMAGE="quay.io/redhat-user-workloads/kueue-operator-tenant/kueue-operator-main:latest"
            fi

            OPERAND_IMAGE=$(echo ${SNAPSHOT} | jq -r '.components[] | select(.name=="kueue-operand-main") | .containerImage')
            if [ "$OPERAND_IMAGE" == "" ]; then
              OPERAND_IMAGE="quay.io/redhat-user-workloads/kueue-operator-tenant/kueue-operand-main:latest"
            fi

            MUSTGATHER_IMAGE=$(echo ${SNAPSHOT} | jq -r '.components[] | select(.name=="kueue-must-gather-main") | .containerImage')
            if [ "$MUSTGATHER_IMAGE" == "" ]; then
              MUSTGATHER_IMAGE="quay.io/redhat-user-workloads/kueue-operator-tenant/kueue-must-gather-main:latest"
            fi

            SRC_REPO=$(echo ${SNAPSHOT} | jq -r '.components[0].source.git.url')
            SRC_REVISION=$(echo ${SNAPSHOT} | jq -r '.components[0].source.git.revision')

            SRC_BASEDIR=$(basename -s .git $SRC_REPO)

            NAMESPACE=openshift-kueue-operator

            echo "----------------------------"
            echo "Images to be tested:"
            echo "Kueue operator: ${OPERATOR_IMAGE}"
            echo "Kueue operand:  ${OPERAND_IMAGE}"
            echo "Kueue must-gather:  ${MUSTGATHER_IMAGE}"
            echo "----------------------------"

            git clone $SRC_REPO
            pushd $SRC_BASEDIR
            git checkout $SRC_REVISION

            # write out a new related_images.json using OPERATOR_* values
            cat << EOF > related_images.json 
            [
              {
                "name": "operator",
                "image": "${OPERATOR_IMAGE}"
              },
              {
                "name": "must-gather",
                "image": "${MUSTGATHER_IMAGE}"
              },
              {
                "name": "operand",
                "image": "${OPERAND_IMAGE}"
              }
            ]
            EOF

            # Required for podman/buildah in rootless container
            echo 'root:1:4294967294' | tee -a /etc/subuid >>/etc/subgid

            # build bundle with references to PR images
            BUILD_CMD="podman build -f bundle.Dockerfile -t quay.io/cmeadors/kueue-bundle:pr-test"
            unshare -Uf --keep-caps -r --map-user=1 -w /var/workdir sh -c "${BUILD_CMD}"

            # push image to cluster
            make bundle-push

            make deploy-cert-manager

            oc create ns ${NAMESPACE}

            # install operator with new bundle
            operator-sdk run bundle $(BUNDLE_IMAGE) -n $(NAMESPACE)

            popd

            # wait for operator
            timeout 300s bash -c 'until oc get deployment openshift-kueue-operator -n openshift-kueue-operator -o jsonpath="{.status.conditions[?(@.type==\"Available\")].status}" | grep -q "True"; do sleep 10; echo "Still waiting..."; done'

            if make e2e-ci-test; then
              RESULT="SUCCESS"
              TEST_EXIT_CODE=0
            else
              RESULT="FAILURE"
              TEST_EXIT_CODE=$?
            fi

            TESTS=$(grep "<testsuites" report.xml | sed -E 's/.*tests="([0-9]+)".*/\1/' | tr -d '\n')
            FAILURES=$(grep "<testsuites" report.xml | sed -E 's/.*failures="([0-9]+)".*/\1/' | tr -d '\n')
            SUCCESSES=$((TESTS-FAILURES))

            TIMESTAMP=$(date +%s)
            TEST_OUTPUT=$(jq -rc \
              --arg result "${RESULT}" \
              --arg timestamp "${TIMESTAMP}" \
              --arg failures "${FAILURES}" \
              --arg successes "${SUCCESSES}" \
              --null-input \
              '{result: $result, timestamp: $timestamp, successes: ($successes | tonumber), warnings: 0, failures: ($failures | tonumber)}')

            echo -n "${TEST_OUTPUT}" | tee $(results.TEST_OUTPUT.path)
            exit ${TEST_EXIT_CODE}
